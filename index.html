<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ellis Trading Dashboard</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #050510; color: #fff; font-family: -apple-system, sans-serif; max-width: 480px; margin: 0 auto; padding-bottom: 40px; }
.header { background: #080818; padding: 16px; border-bottom: 1px solid #1a1a2e; position: sticky; top: 0; z-index: 10; }
.header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.title-sub { font-size: 10px; color: #444; letter-spacing: 3px; text-transform: uppercase; }
.title { font-size: 18px; font-weight: 900; }
.btn { background: #1a1aff; border: none; color: #fff; border-radius: 8px; padding: 8px 16px; font-size: 13px; cursor: pointer; font-weight: 700; }
.btn:disabled { background: #1a1a2e; color: #555; }
.btn-sm { background: #1a1aff; border: none; color: #fff; border-radius: 7px; padding: 7px 14px; font-size: 13px; cursor: pointer; font-weight: 700; }
.tabs { display: flex; gap: 6px; margin-bottom: 8px; position: relative; z-index: 100; }
.tab { flex: 1; padding: 7px; border-radius: 7px; border: 2px solid #1a1a2e; background: transparent; color: #555; font-weight: 700; font-size: 13px; cursor: pointer; }
.tab.active { border-color: #1a1aff; background: #1a1aff22; color: #fff; }
.input-row { display: flex; gap: 6px; margin-bottom: 8px; }
.ticker-input { flex: 1; background: #0d0d1a; border: 1px solid #1a1a2e; border-radius: 7px; padding: 7px 12px; color: #fff; font-size: 13px; outline: none; }
.pmh-row { display: flex; gap: 6px; margin-bottom: 4px; }
.pmh-box { flex: 1; }
.pmh-label { color: #444; font-size: 9px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 3px; }
.pmh-input { width: 100%; background: #0d0d1a; border: 1px solid #1a1a2e; border-radius: 7px; padding: 6px 10px; color: #fff; font-size: 13px; font-family: monospace; outline: none; }
.updated { color: #333; font-size: 10px; text-align: right; }
.content { padding: 16px; }
.verdict { border-radius: 12px; padding: 14px 28px; font-size: 22px; font-weight: 900; letter-spacing: 2px; text-align: center; margin-bottom: 8px; }
.v-ready { background: #0a0a1a; color: #444; border: 1px solid #1a1a2e; }
.v-loading { background: #222; color: #aaa; }
.v-calls { background: #00ff88; color: #000; box-shadow: 0 0 24px #00ff8866; }
.v-puts { background: #ff3b5c; color: #fff; box-shadow: 0 0 24px #ff3b5c66; }
.v-notrade { background: #f5a623; color: #000; }
.v-error { background: #2a0a0a; color: #ff8888; }
.v-exit { background: #ff0000; color: #fff; box-shadow: 0 0 24px #ff000099; }
.reason { color: #777; font-size: 12px; text-align: center; margin-bottom: 12px; }
.price-display { text-align: center; margin-bottom: 14px; }
.price-num { font-size: 44px; font-weight: 900; font-family: monospace; }
.price-label { color: #444; font-size: 12px; }
.section { background: #0a0a1a; border-radius: 12px; padding: 14px; margin-bottom: 12px; border: 1px solid #1a1a2e; }
.sec-title { color: #444; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
.row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #1a1a2e; }
.row:last-child { border-bottom: none; }
.row-label { color: #ccc; font-size: 13px; }
.row-sub { color: #555; font-size: 11px; }
.row-val { font-size: 12px; font-weight: 700; font-family: monospace; margin-left: auto; }
.green { color: #00ff88; } .red { color: #ff3b5c; } .gray { color: #888; }
.purple { color: #a855f7; } .yellow { color: #f5a623; }
.cards { display: flex; gap: 6px; margin-bottom: 6px; }
.card { background: #0d0d1a; border-radius: 8px; padding: 10px 8px; border: 1px solid #1e1e2e; flex: 1; text-align: center; }
.card-label { color: #444; font-size: 9px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
.card-val { font-size: 13px; font-weight: 700; font-family: monospace; }
.flow-row { display: flex; gap: 8px; padding: 6px 0; border-bottom: 1px solid #1a1a2e; align-items: center; }
.exit-box { background: #0a1a0a; border-radius: 12px; padding: 14px; margin-bottom: 12px; border: 1px solid #00ff8833; }
.exit-title { color: #00ff88; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; }
.exit-text { color: #aaa; font-size: 13px; line-height: 1.5; }
.alert-box { background: #ff000022; border: 2px solid #ff0000; border-radius: 12px; padding: 14px; margin-bottom: 12px; text-align: center; }
.alert-text { color: #ff4444; font-size: 16px; font-weight: 900; }
.error-box { background: #1a0808; border: 1px solid #ff3b5c44; border-radius: 10px; padding: 12px; color: #ff8888; font-size: 12px; margin-bottom: 12px; }
.news-item { color: #999; font-size: 12px; padding: 5px 0; border-bottom: 1px solid #1a1a2e; line-height: 1.4; }
.gex-box { background: #0d0d1a; border-radius: 8px; padding: 8px 12px; border: 1px solid #1a1a2e; margin-top: 6px; }
.footer { text-align: center; color: #222; font-size: 10px; margin-top: 12px; }
.refresh-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 4px; }
.refresh-status { color: #333; font-size: 10px; }
</style>
</head>
<body>
<div class="header">
  <div class="header-top">
    <div>
      <div class="title-sub">Ellis Technique</div>
      <div class="title">Trading Dashboard</div>
    </div>
    <button class="btn" id="analyzeBtn" onclick="runAnalysis()">🔄 Analyze</button>
  </div>
  <div class="tabs" style="margin-top:4px;">
    <button class="tab active" id="tab-SPY" onclick="selectTicker('SPY')">$SPY</button>
    <button class="tab" id="tab-QQQ" onclick="selectTicker('QQQ')">$QQQ</button>
    <button class="tab" id="tab-IWM" onclick="selectTicker('IWM')">$IWM</button>
  </div>
  <div class="input-row">
    <input class="ticker-input" id="customTicker" placeholder="Any ticker: ON, NVDA, AMD..." oninput="this.value=this.value.toUpperCase()" onkeydown="if(event.key==='Enter')runAnalysis()">
    <button class="btn-sm" onclick="runAnalysis()">Go</button>
  </div>
  <div class="pmh-row">
    <div class="pmh-box">
      <div class="pmh-label">PMH (manual)</div>
      <input class="pmh-input" id="manualPMH" type="number" step="0.01" placeholder="e.g. 755.20" onchange="pmhValues[activeTicker]=this.value">
    </div>
    <div class="pmh-box">
      <div class="pmh-label">PML (manual)</div>
      <input class="pmh-input" id="manualPML" type="number" step="0.01" placeholder="e.g. 750.10" onchange="pmlValues[activeTicker]=this.value">
    </div>
  </div>
  <div class="pmh-row" style="margin-top:4px;">
    <div class="pmh-box">
      <div class="pmh-label">My Entry Price</div>
      <input class="pmh-input" id="entryPrice" type="number" step="0.01" placeholder="e.g. 1.50" onchange="entryValues[activeTicker]=this.value">
    </div>
    <div class="pmh-box">
      <div class="pmh-label">Position</div>
      <select id="positionType" style="width:100%;background:#0d0d1a;border:1px solid #1a1a2e;border-radius:7px;padding:6px 10px;color:#fff;font-size:13px;outline:none;" onchange="positionValues[activeTicker]=this.value">
        <option value="">None</option>
        <option value="CALLS">CALLS</option>
        <option value="PUTS">PUTS</option>
      </select>
    </div>
  </div>
  <div class="pmh-row" style="margin-top:4px;">
    <div class="pmh-box">
      <div class="pmh-label">Contract Symbol (optional, OCC format)</div>
      <input class="pmh-input" id="contractId" type="text" placeholder="e.g. SPY260619C00740000" style="text-transform:uppercase;" onchange="contractValues[activeTicker]=this.value">
    </div>
    <div class="pmh-box">
      <div class="pmh-label">Live Contract Price</div>
      <div class="pmh-input" id="contractLivePrice" style="display:flex;align-items:center;color:#888;">—</div>
    </div>
  </div>
  <div class="refresh-bar">
    <div class="refresh-status" id="refreshStatus">Auto-refresh: OFF</div>
    <div class="updated" id="updatedTime"></div>
  </div>
  <div class="refresh-bar" style="margin-top:6px;">
    <div class="refresh-status" id="watcherStatus" style="color:#888;">🔭 Background watcher: OFF</div>
    <button id="testPushBtn" onclick="testPushover()" style="background:#1a1a2e;border:1px solid #333;border-radius:7px;padding:5px 10px;color:#fff;font-size:11px;">Test Pushover</button>
  </div>
</div>
<div class="content">
  <div class="verdict v-ready" id="verdictBox">📊 Hit Analyze</div>
  <div class="reason" id="verdictReason"></div>
  <div id="alertBox"></div>
  <div id="priceDisplay"></div>
  <div id="ellisSection"></div>
  <div id="levelsSection"></div>
  <div id="confirmSection"></div>
  <div id="flowSection"></div>
  <div id="exitSection"></div>
  <div id="newsSection"></div>
  <div id="errorBox"></div>
  <div class="footer">Ellis Technique • Unusual Whales API • Not financial advice</div>
</div>
<script>
var PROXY = 'https://uw-proxy-837b.onrender.com/proxy';
var activeTicker = 'SPY';

var pmhValues = { SPY: '', QQQ: '', IWM: '' };
var pmlValues = { SPY: '', QQQ: '', IWM: '' };
var entryValues = { SPY: '', QQQ: '', IWM: '' };
var positionValues = { SPY: '', QQQ: '', IWM: '' };
var contractValues = { SPY: '', QQQ: '', IWM: '' };

var activeTimeframe = '10m';

function selectTimeframe(t) {
  activeTimeframe = t;
  document.querySelectorAll('#tab-10m, #tab-30m').forEach(function(b){ b.classList.remove('active'); });
  document.getElementById('tab-'+t).classList.add('active');
}

var autoRefreshInterval = null;
var PUSHOVER_TOKEN = 'a6xvwbphhv423o7zys4utpe3ufir59';
var PUSHOVER_USER = 'uiizv95oa8xzzec3eyyns3psz67fb1';

function sendPushover(title, message) {
  return fetch('https://api.pushover.net/1/messages.json', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: 'token='+PUSHOVER_TOKEN+'&user='+PUSHOVER_USER+'&title='+encodeURIComponent(title)+'&message='+encodeURIComponent(message)+'&priority=1'
  }).then(function(r){ if(!r.ok) throw new Error('Pushover '+r.status); return r; });
}

function testPushover() {
  var btn = document.getElementById('testPushBtn');
  btn.textContent='Sending...';
  sendPushover('🔔 Test Alert', 'Pushover is connected and working. Sent '+new Date().toLocaleTimeString())
    .then(function(){ btn.textContent='✅ Sent!'; setTimeout(function(){ btn.textContent='Test Pushover'; },2500); })
    .catch(function(){ btn.textContent='❌ Failed'; setTimeout(function(){ btn.textContent='Test Pushover'; },2500); });
}

// ---- Background watcher: monitors SPY/QQQ/IWM independently of whichever tab is open ----
var watcherInterval = null;
var watcherLastVerdict = { SPY:'', QQQ:'', IWM:'' }; // per-ticker, so each ticker's FIRST verdict of the day still fires
var watcherLastAlertTime = { SPY:0, QQQ:0, IWM:0 }; // PATCH 1 (v2): timestamp of last fired alert per ticker, for cooldown
var watcherLastMilestone = { SPY:'', QQQ:'', IWM:'' }; // per-ticker, avoids re-firing the same milestone repeatedly
var watcherLastEmaExit = { SPY:false, QQQ:false, IWM:false }; // PATCH 3: tracks whether exit alert already fired for current position

function watcherCheckMilestone(sym, stockPrice) {
  var entry = parseFloat(entryValues[sym]);
  var pos = positionValues[sym];
  if(!entry || !pos) return;
  var contractSym = (contractValues[sym]||'').trim();
  getContractLivePrice(contractSym).then(function(contractPrice){
    var entry_orig = document.getElementById('entryPrice').value;
    var pos_orig = document.getElementById('positionType').value;
    // checkMilestones reads from the DOM (visible tab fields), so temporarily swap in this ticker's
    // stored values if it's not the active tab, then restore afterward — avoids touching visible UI.
    var isActiveTab = (sym === activeTicker);
    if(!isActiveTab){
      document.getElementById('entryPrice').value = entry;
      document.getElementById('positionType').value = pos;
    }
    var milestone = checkMilestones(stockPrice, contractPrice);
    if(!isActiveTab){
      document.getElementById('entryPrice').value = entry_orig;
      document.getElementById('positionType').value = pos_orig;
    }
    if(milestone && milestone.msg !== watcherLastMilestone[sym]){
      sendPushover('⚠️ EXIT ALERT — '+sym, milestone.msg+' Price: $'+stockPrice.toFixed(2));
      watcherLastMilestone[sym] = milestone.msg;
    } else if(!milestone){
      watcherLastMilestone[sym] = '';
    }
  });
}

// PATCH 3 — fires once when price crosses the 8 EMA against an open position (Ellis's own exit rule)
function watcherCheckEmaExit(sym, stockPrice, ema8) {
  var pos = positionValues[sym];
  var entry = parseFloat(entryValues[sym]);
  if(!pos || !entry || !ema8) {
    watcherLastEmaExit[sym] = false; // no open position — reset so a future trade starts fresh
    return;
  }
  var broke = (pos === 'CALLS' && stockPrice < ema8) || (pos === 'PUTS' && stockPrice > ema8);
  if(broke && !watcherLastEmaExit[sym]){
    sendPushover(
      '🚪 EXIT SIGNAL — '+sym+' '+pos,
      '8 EMA broke. Price $'+stockPrice.toFixed(2)+' vs EMA $'+ema8.toFixed(2)
    );
    watcherLastEmaExit[sym] = true; // don't re-fire every poll while still broken
  } else if(!broke){
    watcherLastEmaExit[sym] = false; // back on the right side of EMA — re-arm for next break
  }
}

function watcherCheckTicker(sym) {
  var pmh = parseFloat(pmhValues[sym]);
  var pml = parseFloat(pmlValues[sym]);
  return uw('/api/option-trades/flow-alerts?ticker_symbol='+sym+'&limit=5').then(function(flowRes){
    var flowData = flowRes.data||[];
    var price = parseFloat(flowData[0]&&flowData[0].underlying_price?flowData[0].underlying_price:0);
    if(!price) return;
    return uw('/api/stock/'+sym+'/ohlc/'+(activeTimeframe==='30m'?'30m':'1m')+'?limit=50').then(function(regOhlc){
      var regCandles=(regOhlc.data||[]).filter(function(c){return c.market_time==='r';});
      regCandles.sort(function(a,b){return new Date(a.start_time)-new Date(b.start_time);});
      var closes=regCandles.map(function(c){return parseFloat(c.close);});
      var ema8=calcEMA(closes,8);
      var ema20=calcEMA(closes,20);

      var vwap=0;
      if(regCandles.length>0){
        var totalTPV=0,totalVol=0;
        regCandles.forEach(function(c){
          var h=parseFloat(c.high),l=parseFloat(c.low),cl=parseFloat(c.close),vol=parseFloat(c.volume||0);
          if(isNaN(h)||isNaN(l)||isNaN(cl)) return;
          var tp=(h+l+cl)/3;
          if(vol>0&&vol<1e9){ totalTPV+=tp*vol; totalVol+=vol; }
        });
        vwap = totalVol>0 ? totalTPV/totalVol : price;
      }

      var abovePMH = pmh>0 ? price>pmh : null;
      var belowPML = pml>0 ? price<pml : null;
      var aboveEMA = ema8 ? price>ema8 : null;
      var aboveVWAP = vwap>0 ? price>vwap : null;
      var volCheck = calcVolumeConfirmation(regCandles);
      var volConfirmed = volCheck.confirmed;
      // PATCH 5 (info-only) — 20 EMA trend alignment is tracked here for the Pushover message
      // context, but does NOT gate verdict. See runAnalysis for the reasoning.
      var trendUp = (ema8!=null && ema20!=null) ? ema8>ema20 : null;
      var trendDown = (ema8!=null && ema20!=null) ? ema8<ema20 : null;

      var verdict='NO TRADE';
      if(abovePMH&&aboveEMA&&aboveVWAP&&volConfirmed) verdict='CALLS';
      else if(belowPML&&aboveEMA===false&&aboveVWAP===false&&volConfirmed) verdict='PUTS';

      // PATCH 1 (v2) — fire instantly on the FIRST confirmed signal, no added latency.
      // 6/18's 5x QQQ spam happened because verdict genuinely dipped to NO TRADE for single
      // 60s ticks (price briefly slipping below VWAP/EMA on chop) then re-confirmed — each
      // re-confirm looked "new" to the old dedup logic even though it was the same move.
      // Fix: once an alert fires for a ticker, require a 10-minute cooldown before that same
      // ticker can alert again, even if it drops out and re-confirms in between. A real new
      // setup later in the day will still get through; a single-tick flicker won't.
      var ALERT_COOLDOWN_MS = 5 * 60 * 1000;
      if(verdict==='CALLS'||verdict==='PUTS'){
        var now = Date.now();
        var cooledDown = (now - watcherLastAlertTime[sym]) > ALERT_COOLDOWN_MS;
        if(verdict!==watcherLastVerdict[sym] && cooledDown){
          var trendNote = '';
          if(verdict==='CALLS' && trendUp===false) trendNote = ' ⚠️ Note: against 20 EMA trend.';
          if(verdict==='PUTS' && trendDown===false) trendNote = ' ⚠️ Note: against 20 EMA trend.';
          sendPushover(
            (verdict==='CALLS'?'🟢 CALLS':'🔴 PUTS')+' — '+sym,
            'All 3 confirmations aligned. Price: $'+price.toFixed(2)+trendNote
          );
          watcherLastAlertTime[sym] = now;
        }
        watcherLastVerdict[sym]=verdict;
      } else {
        watcherLastVerdict[sym]=verdict; // dropped to NO TRADE
      }

      watcherCheckMilestone(sym, price);
      watcherCheckEmaExit(sym, price, ema8); // PATCH 3
    });
  }).catch(function(err){ console.log('Watcher error '+sym, err); });
}

function watcherTick() {
  ['SPY','QQQ','IWM'].forEach(function(sym){
    var hasLevel = parseFloat(pmhValues[sym])>0 || parseFloat(pmlValues[sym])>0;
    var hasPosition = positionValues[sym] && parseFloat(entryValues[sym])>0;
    if(hasLevel || hasPosition){
      watcherCheckTicker(sym);
    }
  });
}

function startWatcher() {
  if(watcherInterval) clearInterval(watcherInterval);
  watcherTick();
  watcherInterval = setInterval(watcherTick, 60000);
  document.getElementById('watcherStatus').textContent='🔭 Background watcher: ON (SPY/QQQ/IWM, 60s) · Scanner: ON (20 tickers, 90s)';
  document.getElementById('watcherStatus').style.color='#00ff88';
  startScanner(); // PATCH 8 — runs alongside the main watcher
}

function stopWatcher() {
  if(watcherInterval) clearInterval(watcherInterval);
  watcherInterval=null;
  document.getElementById('watcherStatus').textContent='🔭 Background watcher: OFF';
  document.getElementById('watcherStatus').style.color='#888';
  stopScanner(); // PATCH 8
}

// ============================================================
// PATCH 8 — Multi-ticker scanner (20 tickers, alert-only, no dashboard tab/UI)
// ============================================================
// Differs from the SPY/QQQ/IWM watcher in 3 ways:
// 1. PMH/PML are AUTO-DETECTED from pre-market OHLC (no manual entry) — per Kenny's own notes
//    this data is "unreliable" generally, but most reliable on heavy-volume names, which is why
//    this list is restricted to liquid large caps across sectors rather than smaller/illiquid names.
// 2. LIGHTER confirmation stack: PMH/PML + 8 EMA + Volume only. No VWAP, no sentiment (Flow/Tide/
//    Dark Pool), no 20 EMA trend check — keeps the API load reasonable across 20 names polled
//    on a timer, and accepts these are noisier, lower-conviction signals than the hand-tuned 3.
// 3. LONGER cooldown (20 min vs 5 min) since auto-detected levels + a lighter gate produce more
//    false starts; a longer window avoids alert spam from a list this size.
// Surfaces ONLY via Pushover — no dedicated screen/tab, by design, to avoid maintaining 20 sets
// of UI. This is intentionally a lower-priority, broader net layered on top of the main 3-ticker
// system, not a replacement for it.

var SCANNER_TICKERS = ['NVDA','AAPL','MSFT','AMD','META','GOOGL','JPM','BAC','GS','XOM','CVX','UNH','LLY','AMZN','TSLA','WMT','CAT','BA','AVGO','MU'];
var SCANNER_POLL_MS = 90000; // 90s between full scanner passes (vs 60s for the 3-ticker watcher) — lighter pace given 20 tickers
var SCANNER_COOLDOWN_MS = 20 * 60 * 1000; // 20 min, longer than the main watcher's 5 min — see note above
var scannerInterval = null;
var scannerLastVerdict = {};
var scannerLastAlertTime = {};
SCANNER_TICKERS.forEach(function(t){ scannerLastVerdict[t]=''; scannerLastAlertTime[t]=0; });

function scannerCheckTicker(sym) {
  return uw('/api/option-trades/flow-alerts?ticker_symbol='+sym+'&limit=5').then(function(flowRes){
    var flowData = flowRes.data||[];
    var price = parseFloat(flowData[0]&&flowData[0].underlying_price?flowData[0].underlying_price:0);
    if(!price) return;
    return Promise.all([
      uw('/api/stock/'+sym+'/ohlc/1m?market_time=pre'),
      uw('/api/stock/'+sym+'/ohlc/1m?limit=50')
    ]).then(function(results){
      var preOhlc = results[0];
      var regOhlc = results[1];
      var preCandles = (preOhlc.data||[]).filter(function(c){return c.market_time==='pre';});
      var regCandles = (regOhlc.data||[]).filter(function(c){return c.market_time==='r';});
      regCandles.sort(function(a,b){return new Date(a.start_time)-new Date(b.start_time);});

      // Auto-detected PMH/PML — no manual override available for scanner tickers
      var pmh = preCandles.length>0 ? Math.max.apply(null, preCandles.map(function(c){return parseFloat(c.high);})) : 0;
      var pml = preCandles.length>0 ? Math.min.apply(null, preCandles.map(function(c){return parseFloat(c.low);})) : 0;

      var closes = regCandles.map(function(c){return parseFloat(c.close);});
      var ema8 = calcEMA(closes,8);

      var abovePMH = pmh>0 ? price>pmh : null;
      var belowPML = pml>0 ? price<pml : null;
      var aboveEMA = ema8 ? price>ema8 : null;
      var volCheck = calcVolumeConfirmation(regCandles);
      var volConfirmed = volCheck.confirmed;

      // LIGHTER gate: PMH/PML + 8 EMA + Volume only (no VWAP, no sentiment, no 20 EMA)
      var verdict='NO TRADE';
      if(abovePMH&&aboveEMA&&volConfirmed) verdict='CALLS';
      else if(belowPML&&aboveEMA===false&&volConfirmed) verdict='PUTS';

      if(verdict==='CALLS'||verdict==='PUTS'){
        var now = Date.now();
        var cooledDown = (now - scannerLastAlertTime[sym]) > SCANNER_COOLDOWN_MS;
        if(verdict!==scannerLastVerdict[sym] && cooledDown){
          sendPushover(
            '🔍 SCANNER — '+(verdict==='CALLS'?'🟢 CALLS':'🔴 PUTS')+' — '+sym,
            'PMH/PML (auto) + 8 EMA + Volume aligned. Price: $'+price.toFixed(2)+' · Lighter check, not full Ellis gate.'
          );
          scannerLastAlertTime[sym] = now;
        }
        scannerLastVerdict[sym]=verdict;
      } else {
        scannerLastVerdict[sym]=verdict;
      }
    });
  }).catch(function(err){ console.log('Scanner error '+sym, err); });
}

function scannerTick() {
  // Stagger requests slightly instead of firing all 20 at once, to be gentler on the proxy/API
  SCANNER_TICKERS.forEach(function(sym, i){
    setTimeout(function(){ scannerCheckTicker(sym); }, i*300);
  });

function getTicker() {

function uw(path) {
  return fetch(PROXY+'?path='+encodeURIComponent(path)).then(function(r){
    if(!r.ok) throw new Error(r.status+': '+path);
    return r.json();
  });
}

function calcEMA(arr, period) {
  if(!arr||arr.length<period) return null;
  var k=2/(period+1);
  var ema=arr.slice(0,period).reduce(function(a,b){return a+b;},0)/period;
  for(var i=period;i<arr.length;i++) ema=arr[i]*k+ema*(1-k);
  return ema;
}

// PATCH 4 — Volume confirmation. Compares the most recent candle's volume against the average
// volume of the prior candles. A breakout on weak volume is a classic fakeout trap — this
// requires real participation behind the move before the verdict can fire CALLS/PUTS.
var VOLUME_THRESHOLD_MULTIPLIER = 1.5;
function calcVolumeConfirmation(candles) {
  if(!candles || candles.length < 6) return { confirmed: null, ratio: null }; // not enough data yet
  var vols = candles.map(function(c){ return parseFloat(c.volume||0); }).filter(function(v){ return v>0 && v<1e9; });
  if(vols.length < 6) return { confirmed: null, ratio: null };
  var lastVol = vols[vols.length-1];
  var priorVols = vols.slice(0, -1);
  var avgVol = priorVols.reduce(function(a,b){ return a+b; }, 0) / priorVols.length;
  if(avgVol<=0) return { confirmed: null, ratio: null };
  var ratio = lastVol / avgVol;
  return { confirmed: ratio >= VOLUME_THRESHOLD_MULTIPLIER, ratio: ratio };
}

function setVerdict(cls,txt) {

function sc(v){ return v==='Bullish'?'#00ff88':v==='Bearish'?'#ff3b5c':'#888'; }
function chk(v){ return v===true?'✅':v===false?'❌':'⏳'; }
function cl(v){ return v===true?'green':v===false?'red':'gray'; }
function pf(v){ return v>0?'$'+parseFloat(v).toFixed(2):'—'; }

function checkMilestones(stockPrice, contractPrice) {
  var entry = parseFloat(document.getElementById('entryPrice').value);
  var pos = document.getElementById('positionType').value;
  if(!entry||!pos) return null;
  // Prefer real contract price when available; fall back to stock-price proxy
  var usingReal = contractPrice!=null && !isNaN(contractPrice) && contractPrice>0;
  var refPrice = usingReal ? contractPrice : stockPrice;
  var pct = usingReal
    ? ((refPrice-entry)/entry)*100
    : (pos==='CALLS' ? ((stockPrice-entry)/entry)*100 : ((entry-stockPrice)/entry)*100);
  var src = usingReal ? '' : ' (est. from stock price)';
  if(pct<=-30) return { msg:'🛑 STOP LOSS — EXIT NOW (-30%)'+src, cls:'v-exit' };
  if(pct>=100) return { msg:'🚨 +100% — SELL 1, RUNNER IS FREE'+src, cls:'v-exit' };
  if(pct>=50)  return { msg:'⚡ +50% — SCALE OUT, SELL 1'+src, cls:'v-exit' };
  if(pct>=30)  return { msg:'✅ +30% MILESTONE HIT'+src, cls:'v-calls' };
  return null;
}

function getContractLivePrice(contractId) {
  if(!contractId) return Promise.resolve(null);
  return uw('/api/option-contract/'+contractId+'/intraday').then(function(res){
    var data = res.data||[];
    if(!data.length) return null;
    var last = data[data.length-1];
    return parseFloat(last.close||last.price||last.last_price||0) || null;
  }).catch(function(){ return null; });
}

function runAnalysis() {
  var sym=getTicker();
  var btn=document.getElementById('analyzeBtn');
  btn.disabled=true;
  btn.textContent='⏳ Loading...';
  clearAll();
  setVerdict('v-loading','⏳ ANALYZING '+sym+'...');

  var flowData=[];
  var price=0;

  // PATCH 9c — the flow-alerts call below supplies `price`, which everything downstream needs,
  // so it isn't a candidate for allSettled-style "fall back to empty" — without price there's
  // nothing to show. Instead: retry once automatically on failure before giving up. This was the
  // actual source of the recurring "Error: Load failed" screens (this call sits BEFORE the
  // allSettled block added below, so that fix didn't cover it).
  function fetchFlowWithRetry(retried){
    return uw('/api/option-trades/flow-alerts?ticker_symbol='+sym+'&limit=10').catch(function(err){
      if(!retried){
        return new Promise(function(resolve){ setTimeout(resolve, 800); }).then(function(){
          return fetchFlowWithRetry(true);
        });
      }
      throw err; // already retried once — let it fail for real
    });
  }

  fetchFlowWithRetry(false)
  .then(function(flowRes){
    flowData=flowRes.data||[];
    price=parseFloat(flowData[0]&&flowData[0].underlying_price?flowData[0].underlying_price:0);
    var contractId = document.getElementById('contractId').value.trim();
    // PATCH 9 — allSettled instead of all: one failed call (timeout, transient API error) used
    // to abort the ENTIRE analysis via Promise.all's all-or-nothing behavior, even when 6 of 7
    // calls succeeded. This was causing repeated "Load failed" errors mid-trading-day. Now each
    // call is unwrapped individually below — a failed one just falls back to empty data instead
    // of killing everything else.
    return Promise.allSettled([
      uw('/api/darkpool/'+sym),
      uw('/api/market/market-tide'),
      uw('/api/stock/'+sym+'/spot-exposures/strike'),
      uw('/api/news/headlines?limit=5'),
      uw('/api/stock/'+sym+'/ohlc/1m?market_time=pre'),
      uw('/api/stock/'+sym+'/ohlc/'+(activeTimeframe==='30m'?'30m':'1m')+'?limit=50'),
      getContractLivePrice(contractId)
    ]);
  })
  .then(function(settled){
    // Unwrap each settled result: fulfilled -> its value, rejected -> safe empty fallback
    var failedCalls = [];
    function unwrap(i, label, fallback){
      if(settled[i].status === 'fulfilled') return settled[i].value;
      failedCalls.push(label);
      return fallback;
    }
    var dpRes    = unwrap(0, 'Dark Pool', {data:[]});
    var tideRes  = unwrap(1, 'Market Tide', {data:[]});
    var gexRes   = unwrap(2, 'GEX', {data:[]});
    var newsRes  = unwrap(3, 'News', {data:[]});
    var preOhlc  = unwrap(4, 'Pre-market OHLC', {data:[]});
    var regOhlc  = unwrap(5, 'Regular OHLC', {data:[]});
    var contractPrice = settled[6].status==='fulfilled' ? settled[6].value : null;

    // PATCH 9 — staleness guard: if the person switched tabs/tickers WHILE this analysis was
    // still in flight (e.g. tapped QQQ, then tapped SPY before QQQ's analysis finished), the
    // late-arriving QQQ result used to render anyway, showing a "$QQQ • Live" label under the
    // SPY tab with frozen QQQ data. Now: if the ticker on screen no longer matches the ticker
    // this analysis was FOR, discard these results silently instead of rendering them.
    if(getTicker() !== sym){
      btn.disabled=false;
      btn.textContent='🔄 Analyze';
      return;
    }

    var results=[dpRes,tideRes,gexRes,newsRes,preOhlc,regOhlc,contractPrice]; // kept for compatibility below

    var preCandles=(preOhlc.data||[]).filter(function(c){return c.market_time==='pre';});
    var regCandles=(regOhlc.data||[]).filter(function(c){return c.market_time==='r';});
    regCandles.sort(function(a,b){return new Date(a.start_time)-new Date(b.start_time);});

    var pmh=preCandles.length>0?Math.max.apply(null,preCandles.map(function(c){return parseFloat(c.high);})):0;
    var pml=preCandles.length>0?Math.min.apply(null,preCandles.map(function(c){return parseFloat(c.low);})):0;

    var manualPMH=parseFloat(document.getElementById('manualPMH').value);
    var manualPML=parseFloat(document.getElementById('manualPML').value);
    if(!isNaN(manualPMH)&&manualPMH>0) pmh=manualPMH;
    if(!isNaN(manualPML)&&manualPML>0) pml=manualPML;

    // PATCH 9 — flag when CRITICAL data (the OHLC calls that feed EMA/VWAP/Volume/verdict) failed,
    // so the verdict is never shown as confident when it's actually built on missing price data.
    // Non-critical failures (News, GEX, Dark Pool, Market Tide) just silently show as empty —
    // those are context cards, not gates, so missing them doesn't compromise the verdict itself.
    var criticalFailed = failedCalls.filter(function(f){ return f==='Pre-market OHLC' || f==='Regular OHLC'; });
    if(criticalFailed.length>0){
      document.getElementById('errorBox').innerHTML =
        '<div class="error-box"><strong>⚠️ Partial data:</strong> '+criticalFailed.join(' & ')+' failed to load for '+sym+'. Verdict below may be unreliable — retry Analyze.</div>';
    } else if(failedCalls.length>0){
      document.getElementById('errorBox').innerHTML =
        '<div class="error-box" style="opacity:0.7"><strong>Note:</strong> '+failedCalls.join(', ')+' didn\'t load this refresh (non-critical) — verdict is still valid.</div>';
    }

    // PATCH 2 — visible sanity check in the dashboard itself when Analyze runs
    if(pmh>0 && pml>0 && pml>=pmh){
      document.getElementById('errorBox').innerHTML =
        '<div class="error-box"><strong>⚠️ Level check:</strong> PML ($'+pml.toFixed(2)+') is not below PMH ($'+pmh.toFixed(2)+') for '+sym+'. Verify these before trusting the verdict.</div>';
    }

    var closes=regCandles.map(function(c){return parseFloat(c.close);});
    var ema8=calcEMA(closes,8);
    var ema20=calcEMA(closes,20);

    var vwap=0;
    if(regCandles.length>0){
      var totalTPV=0,totalVol=0,validCount=0;
      regCandles.forEach(function(c) {
        var h=parseFloat(c.high), l=parseFloat(c.low), cl=parseFloat(c.close), vol=parseFloat(c.volume||0);
        if(isNaN(h)||isNaN(l)||isNaN(cl)) return;
        var tp=(h+l+cl)/3;
        if(vol>0 && vol<1e9){ totalTPV+=tp*vol; totalVol+=vol; }
        validCount++;
      });
      vwap = totalVol>0 ? totalTPV/totalVol : (validCount>0 ? price : 0);
    }

    var callPrem=0,putPrem=0;
    flowData.forEach(function(f){
      var p=parseFloat(f.total_premium||f.premium||0);
      if((f.put_call||'').toLowerCase()==='call') callPrem+=p;
      else putPrem+=p;
    });
    var flowSentiment=callPrem>putPrem?'Bullish':putPrem>callPrem?'Bearish':'Neutral';
    var flowNet=((callPrem-putPrem)/1e6).toFixed(2);

    var dpData=dpRes.data||[];
    var dpAbove=dpData.filter(function(d){return parseFloat(d.price||d.executed_price||0)>price;}).length;
    var dpBelow=dpData.filter(function(d){return parseFloat(d.price||d.executed_price||0)<price;}).length;
    var darkPoolBias=dpAbove>dpBelow?'Bullish':dpBelow>dpAbove?'Bearish':'Neutral';

    var tideArr=tideRes.data||[];
    var latestTide=tideArr[tideArr.length-1]||{};
    var tideNet=parseFloat(latestTide.net_call_premium||latestTide.net_premium||0);
    var marketTide=tideNet>0?'Bullish':tideNet<0?'Bearish':'Neutral';

    var gexData=gexRes.data||[];
    gexData.sort(function(a,b){return Math.abs(parseFloat(b.total_gex||b.gex||0))-Math.abs(parseFloat(a.total_gex||a.gex||0));});
    var topGex=gexData[0]||null;
    var newsData=newsRes.data||newsRes.results||[];

    var abovePMH=pmh>0?price>pmh:null;
    var belowPML=pml>0?price<pml:null;
    var aboveEMA=ema8?price>ema8:null;
    var aboveVWAP=vwap>0?price>vwap:null;
    var volCheck=calcVolumeConfirmation(regCandles);
    var volConfirmed=volCheck.confirmed;
    var volRatioTxt = volCheck.ratio!=null ? volCheck.ratio.toFixed(2)+'x avg' : '—';
    // PATCH 5 (info-only) — 20 EMA trend alignment is computed and shown, but does NOT gate the
    // verdict yet. Kenny's 6/18 results (3-for-3, no losers) came from a choppy day using only
    // PMH/8EMA/VWAP — exactly the day type this filter would suppress signals on. Tracking it
    // alongside real trades first, before deciding whether it should become a hard gate.
    var trendUp = (ema8!=null && ema20!=null) ? ema8>ema20 : null;
    var trendDown = (ema8!=null && ema20!=null) ? ema8<ema20 : null;
    var trendCheckForDisplay = belowPML ? trendDown : trendUp; // show whichever direction is relevant to the active setup

    // PATCH 7 — Sentiment gate (Analyze-only, NOT in the Background Watcher/Pushover path).
    // Requires at least 2 of 3 (Options Flow, Market Tide, Dark Pool) to agree with the verdict
    // direction before CALLS/PUTS can fire. The watcher doesn't currently pull this data, so
    // Pushover alerts still fire on the original 4 gates only — this is a stricter check that
    // only applies when the dashboard is open and Analyze is run by hand.
    var bullishCount = [flowSentiment,marketTide,darkPoolBias].filter(function(s){return s==='Bullish';}).length;
    var bearishCount = [flowSentiment,marketTide,darkPoolBias].filter(function(s){return s==='Bearish';}).length;
    var sentimentConfirmsCalls = bullishCount>=2;
    var sentimentConfirmsPuts = bearishCount>=2;
    var sentimentSummaryTxt = 'Flow '+flowSentiment+' / Tide '+marketTide+' / Dark Pool '+darkPoolBias;

    var verdict='NO TRADE';
    var reason='Enter PMH/PML above or waiting for level break';

    if(abovePMH&&aboveEMA&&aboveVWAP&&volConfirmed&&sentimentConfirmsCalls){
      verdict='CALLS';
      reason = trendUp===false
        ? 'Above PMH + 8 EMA + VWAP + Volume + Sentiment ✅ (note: 8 EMA below 20 EMA — against broader trend)'
        : 'Above PMH + 8 EMA + VWAP + Volume + Sentiment ✅';
    } else if(belowPML&&aboveEMA===false&&aboveVWAP===false&&volConfirmed&&sentimentConfirmsPuts){
      verdict='PUTS';
      reason = trendDown===false
        ? 'Below PML + 8 EMA + VWAP + Volume + Sentiment ✅ (note: 8 EMA above 20 EMA — against broader trend)'
        : 'Below PML + 8 EMA + VWAP + Volume + Sentiment ✅';
    } else if(abovePMH&&aboveEMA&&aboveVWAP&&volConfirmed&&!sentimentConfirmsCalls){
      reason='Above PMH + 8 EMA + VWAP + Volume, but sentiment doesn\'t back it up (need 2/3 bullish — '+sentimentSummaryTxt+') — no trade';
    } else if(belowPML&&aboveEMA===false&&aboveVWAP===false&&volConfirmed&&!sentimentConfirmsPuts){
      reason='Below PML + 8 EMA + VWAP + Volume, but sentiment doesn\'t back it up (need 2/3 bearish — '+sentimentSummaryTxt+') — no trade';
    } else if(abovePMH&&aboveEMA&&aboveVWAP&&volConfirmed===false){
      reason='Above PMH + 8 EMA + VWAP, but volume is weak ('+volRatioTxt+') — likely fakeout, no trade';
    } else if(belowPML&&aboveEMA===false&&aboveVWAP===false&&volConfirmed===false){
      reason='Below PML + 8 EMA + VWAP, but volume is weak ('+volRatioTxt+') — likely fakeout, no trade';
    } else if(pmh>0&&pml>0){
      reason='Between PMH/PML — Do NOT Diddle in the Middle';
    } else if(ema8&&price<ema8){
      reason='Below 8 EMA — bearish lean, confirm PML';
    } else if(ema8&&price>ema8){
      reason='Above 8 EMA — bullish lean, confirm PMH';
    }

    var liveDisplay = document.getElementById('contractLivePrice');
    var contractIdVal = document.getElementById('contractId').value.trim();
    if(contractPrice!=null){
      liveDisplay.textContent = '$'+contractPrice.toFixed(2);
      liveDisplay.style.color = '#00ff88';
    } else if(contractIdVal){
      liveDisplay.textContent = '— (unavailable)';
      liveDisplay.style.color = '#888';
    } else {
      liveDisplay.textContent = '—';
      liveDisplay.style.color = '#888';
    }

    var milestone=checkMilestones(price, contractPrice);
    if(milestone){
      setVerdict(milestone.cls, milestone.msg);
      document.getElementById('alertBox').innerHTML=
        '<div class="alert-box"><div class="alert-text">'+milestone.msg+'</div></div>';
    } else {
      var vMap={CALLS:['v-calls','🟢 CALLS'],PUTS:['v-puts','🔴 PUTS'],'NO TRADE':['v-notrade','⚠️ NO TRADE']};
      setVerdict(vMap[verdict][0],vMap[verdict][1]);
    }

    document.getElementById('verdictReason').textContent=reason;

    if(price>0){
      document.getElementById('priceDisplay').innerHTML=
        '<div class="price-display"><div class="price-num">$'+price.toFixed(2)+'</div><div class="price-label">$'+sym+' • Live</div></div>';
    }

    document.getElementById('ellisSection').innerHTML=
      '<div class="section"><div class="sec-title">Ellis Criteria ('+activeTimeframe+' Chart)</div>'
      +'<div class="row"><span style="font-size:16px">'+chk(abovePMH)+'</span><div style="flex:1"><div class="row-label">Above PMH</div><div class="row-sub">Break pre-market high</div></div><span class="row-val '+cl(abovePMH)+'">'+pf(pmh)+'</span></div>'
      +'<div class="row"><span style="font-size:16px">'+chk(aboveEMA)+'</span><div style="flex:1"><div class="row-label">Above 8 EMA ('+activeTimeframe+')</div><div class="row-sub">Hold while above</div></div><span class="row-val '+cl(aboveEMA)+'">'+(ema8?'$'+ema8.toFixed(2):'—')+'</span></div>'
      +'<div class="row"><span style="font-size:16px">'+chk(aboveVWAP)+'</span><div style="flex:1"><div class="row-label">Above VWAP</div><div class="row-sub">Institutional benchmark</div></div><span class="row-val '+cl(aboveVWAP)+'">'+pf(vwap)+'</span></div>'
      +'<div class="row"><span style="font-size:16px">'+chk(volConfirmed)+'</span><div style="flex:1"><div class="row-label">Volume Confirmation</div><div class="row-sub">'+VOLUME_THRESHOLD_MULTIPLIER+'x avg required</div></div><span class="row-val '+cl(volConfirmed)+'">'+volRatioTxt+'</span></div>'
      +'<div class="row"><span style="font-size:16px">'+chk(trendCheckForDisplay)+'</span><div style="flex:1"><div class="row-label">8/20 EMA Trend Align</div><div class="row-sub">Short-term agrees with medium-term</div></div><span class="row-val '+cl(trendCheckForDisplay)+'">'+(ema20?'$'+ema20.toFixed(2):'—')+'</span></div>'
      +'</div>';

    document.getElementById('levelsSection').innerHTML=
      '<div class="section"><div class="sec-title">Key Levels</div>'
      +'<div class="cards">'
      +'<div class="card"><div class="card-label">PMH</div><div class="card-val green">'+pf(pmh)+'</div></div>'
      +'<div class="card"><div class="card-label">PML</div><div class="card-val red">'+pf(pml)+'</div></div>'
      +'<div class="card"><div class="card-label">8 EMA</div><div class="card-val purple">'+(ema8?'$'+ema8.toFixed(2):'—')+'</div></div>'
      +'<div class="card"><div class="card-label">VWAP</div><div class="card-val yellow">'+pf(vwap)+'</div></div>'
      +'</div>'
      +(topGex?'<div class="gex-box"><div style="color:#444;font-size:10px;text-transform:uppercase">Top GEX Strike</div><div class="yellow" style="font-family:monospace;font-size:15px;font-weight:700">$'+(topGex.strike||topGex.level||'?')+'</div></div>':'')
      +'</div>';

    document.getElementById('confirmSection').innerHTML=
      '<div class="section"><div class="sec-title">Confirmation (gate: 2/3 must agree)</div>'
      +'<div class="cards">'
      +'<div class="card"><div class="card-label">Options Flow</div><div class="card-val" style="color:'+sc(flowSentiment)+'">'+flowSentiment+'</div></div>'
      +'<div class="card"><div class="card-label">Market Tide</div><div class="card-val" style="color:'+sc(marketTide)+'">'+marketTide+'</div></div>'
      +'<div class="card"><div class="card-label">Dark Pool</div><div class="card-val" style="color:'+sc(darkPoolBias)+'">'+darkPoolBias+'</div></div>'
      +'</div>'
      +'<div style="color:#555;font-size:12px;margin-top:6px">Net Premium: <span style="color:#fff;font-weight:700">'+(parseFloat(flowNet)>0?'+':'')+'$'+flowNet+'M</span></div>'
      +'<div style="color:#555;font-size:12px;margin-top:4px">Bullish: '+bullishCount+'/3 '+(sentimentConfirmsCalls?'✅':'')+' · Bearish: '+bearishCount+'/3 '+(sentimentConfirmsPuts?'✅':'')+'</div>'
      +'</div>';

    if(flowData.length>0){
      var rows='';
      flowData.slice(0,6).forEach(function(f){
        var isCall=(f.put_call||'').toLowerCase()==='call';
        var prem=parseFloat(f.total_premium||f.premium||0);
        rows+='<div class="flow-row">'
          +'<span style="color:'+(isCall?'#00ff88':'#ff3b5c')+';font-size:11px;font-weight:700;min-width:34px">'+(isCall?'CALL':'PUT')+'</span>'
          +'<span style="color:#ccc;font-size:12px;font-family:monospace;flex:1">$'+(f.strike_price||f.strike||'?')+' • '+(f.expiry||f.expiration_date||'?')+'</span>'
          +'<span style="color:#4488ff;font-size:12px">$'+(prem/1e6).toFixed(2)+'M</span>'
          +'</div>';
      });
      document.getElementById('flowSection').innerHTML=
        '<div class="section"><div class="sec-title">Top Flow Alerts — $'+sym+'</div>'+rows+'</div>';
    }

    if(verdict==='CALLS'||verdict==='PUTS'){
      document.getElementById('exitSection').innerHTML=
        '<div class="exit-box"><div class="exit-title">Exit Rule — Ellis</div>'
        +'<div class="exit-text">Hold while price stays '+(verdict==='CALLS'?'above':'below')+' 8 EMA: <strong style="color:#fff">$'+(ema8?ema8.toFixed(2):'—')+'</strong><br>8 EMA breaks → <strong class="red">EXIT IMMEDIATELY</strong></div></div>';
    }

    if(newsData.length>0){
      var nh='';
      newsData.slice(0,4).forEach(function(n){ nh+='<div class="news-item">'+(n.title||n.headline||'')+'</div>'; });
      document.getElementById('newsSection').innerHTML=
        '<div class="section"><div class="sec-title">Market News</div>'+nh+'</div>';
    }

    document.getElementById('updatedTime').textContent='Updated: '+new Date().toLocaleTimeString();
    startAutoRefresh();
  })
  .catch(function(err){
    setVerdict('v-error','⚠️ ERROR');
    document.getElementById('errorBox').innerHTML=
      '<div class="error-box"><strong>Error (retried once, still failed):</strong> '+err.message+'. Try Analyze again — proxy/API may be briefly overloaded.</div>';
  })
  .finally(function(){
    btn.disabled=false;
    btn.textContent='🔄 Analyze';
  });
}
</script>
</body>
</html>
